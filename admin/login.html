<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Admin Access</title>
    <link href="../assets/css/output.css" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="bg-[#050810] text-gray-300 flex items-center justify-center min-h-screen relative overflow-hidden">

    <div class="fixed inset-0 z-0">
        <div class="global-stars"></div>
    </div>

    <div class="w-full max-w-md p-8 bg-[#0b1121]/80 backdrop-blur-xl border border-white/5 rounded-3xl shadow-2xl z-10">
        <div class="text-center mb-10">
            <img src="../assets/images/logo.png" alt="Logo"
                class="h-16 w-16 mx-auto mb-4 bg-white p-1 rounded-full shadow-[0_0_20px_rgba(34,211,238,0.4)]">
            <h2 class="text-2xl font-bold text-white tracking-tight">Admin Access</h2>
            <p class="text-gray-400 text-sm mt-2">Enter your credentials to continue</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Admin
                    Email</label>
                <div class="relative">
                    <i class="ph ph-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="email" id="adminEmail" required
                        class="w-full bg-[#151e32] border border-white/5 rounded-xl py-3 pl-12 pr-4 text-white focus:outline-none focus:border-[#22d3ee] transition-all"
                        placeholder="admin@snkpm.com">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Password</label>
                <div class="relative">
                    <i class="ph ph-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="password" id="adminPassword" required
                        class="w-full bg-[#151e32] border border-white/5 rounded-xl py-3 pl-12 pr-4 text-white focus:outline-none focus:border-[#22d3ee] transition-all"
                        placeholder="••••••••">
                </div>
            </div>

            <div id="loginError"
                class="hidden p-3 bg-red-500/10 border border-red-500/20 text-red-400 text-xs rounded-xl text-center">
                Invalid credentials. Please try again.
            </div>

            <button type="submit"
                class="w-full bg-gradient-to-r from-[#22d3ee] to-[#a855f7] text-white font-bold py-3.5 rounded-xl hover:opacity-90 transition-all shadow-lg shadow-cyan-500/20">
                Access Dashboard
            </button>
        </form>
    </div>

    <script src="../assets/js/auth.js"></script>
</body>

</html>
